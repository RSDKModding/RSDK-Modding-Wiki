name: pull-request-check
on:
  pull_request:
    paths:
      - docs/**
      - overrides/**
      - mkdocs.yml
    branches: 
      - master

env:
  CI: False

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - run: pip install zensical
      - run: zensical build --clean
